<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirigiendo...</title>
    <script>
      // Redirect deep links to index preserving route/query/hash for SPA routing.
      ;(function (location) {
        const pathSegmentsToKeep = 1
        const newUrl =
          `${location.protocol}//${location.hostname}${location.port ? `:${location.port}` : ''}` +
          `${location.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/')}/?/` +
          `${location.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~')}` +
          `${location.search ? `&${location.search.slice(1).replace(/&/g, '~and~')}` : ''}` +
          location.hash

        location.replace(newUrl)
      })(window.location)
    </script>
  </head>
  <body></body>
</html>
